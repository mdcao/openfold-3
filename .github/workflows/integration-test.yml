name: Run integration tests with docker image

on:
  schedule:
    # GitHub-hosted schedulers see heavy contention on the hour; offsetting by
    # 17 minutes reduces queue delay and avoids colliding with other
    # AWS-runner-launching workflows that fire on :00.
    - cron: '17 3 * * *' # daily at 03:17 UTC
  workflow_dispatch:

jobs:
  test-conda:
    permissions:
      id-token: write
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - cuda_base_image_tag: "12.1.1-cudnn8-devel-ubuntu22.04"
            build_mode: "yaml"
    concurrency:
      group: ${{ github.workflow }}-conda-${{ github.head_ref || github.ref }}-${{ matrix.cuda_base_image_tag }}
      cancel-in-progress: true
    uses: ./.github/workflows/ci-integration-test-conda-reusable.yml
    with:
      cuda_base_image_tag: ${{ matrix.cuda_base_image_tag }}
      build_mode: ${{ matrix.build_mode }}
    secrets: inherit

  test-pixi:
    permissions:
      id-token: write
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - pixi_env: "openfold3-cuda12"
          - pixi_env: "openfold3-cuda13"
    concurrency:
      group: ${{ github.workflow }}-pixi-${{ github.head_ref || github.ref }}-${{ matrix.pixi_env }}
      cancel-in-progress: true
    uses: ./.github/workflows/ci-integration-test-pixi-reusable.yml
    with:
      pixi_env: ${{ matrix.pixi_env }}
    secrets: inherit
